<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rumbo — Admin Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1f3d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 800;
      color: #0f1f3d;
      letter-spacing: -0.5px;
    }

    .logo h1 span {
      color: #22c55e;
    }

    .logo p {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      color: #111827;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 18px;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #0f1f3d;
    }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #16a34a;
    }

    button[type="submit"]:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .error {
      background: #fee2e2;
      color: #b91c1c;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>Rumbo<span>.</span></h1>
      <p>Panel de administración</p>
    </div>

    <div class="error" id="errorMsg"></div>

    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="admin@ejemplo.com" autocomplete="email" required />

      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />

      <button type="submit" id="submitBtn">Iniciar sesión</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const ADMIN_EMAIL = 'ramiro.suarezf@gmail.com';
    let supabaseClient = null;

    const errorMsg  = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function clearError() {
      errorMsg.textContent = '';
      errorMsg.classList.remove('visible');
    }

    async function initSupabase() {
      supabaseClient = supabase.createClient(window.__SB_URL__, window.__SB_ANON__);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      submitBtn.disabled    = true;
      submitBtn.textContent = 'Ingresando...';

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
          showError('Email o contraseña incorrectos.');
          return;
        }

        if (data.user.email !== ADMIN_EMAIL) {
          showError('No tenés permiso para acceder al panel.');
          await supabaseClient.auth.signOut();
          return;
        }

        localStorage.setItem('rumbo_admin_session', JSON.stringify(data.session));
        window.location.href = '/admin';

      } catch (err) {
        showError('Ocurrió un error. Intentá de nuevo.');
        console.error(err);
      } finally {
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Iniciar sesión';
      }
    });

    initSupabase().catch(err => {
      showError('No se pudo conectar con el servidor.');
      console.error(err);
    });
  </script>
</body>
</html>
