<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Pago confirmado! — Rumbo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0A1628;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #0F1E35;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    .icon {
      width: 56px;
      height: 56px;
      background: rgba(0,210,106,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 0.9375rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 2rem;
      line-height: 1.5;
    }
    .subtitle strong { color: #00D26A; }
    form { display: flex; flex-direction: column; gap: 1rem; text-align: left; }
    label { font-size: 0.875rem; font-weight: 500; color: rgba(255,255,255,0.75); margin-bottom: 0.25rem; display: block; }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #00D26A; }
    input::placeholder { color: rgba(255,255,255,0.3); }
    button[type="submit"] {
      background: #00D26A;
      color: #0A1628;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.875rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
    }
    button[type="submit"]:hover { opacity: 0.88; }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
    .success-msg {
      display: none;
      background: rgba(0,210,106,0.1);
      border: 1px solid rgba(0,210,106,0.25);
      border-radius: 10px;
      padding: 1.25rem;
      font-size: 0.9375rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.85);
    }
    .success-msg strong { color: #00D26A; display: block; margin-bottom: 0.25rem; font-size: 1rem; }
    .error-msg {
      color: #FF6B6B;
      font-size: 0.875rem;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>¡Pago confirmado!</h1>
    <p class="subtitle">Dejanos tu nombre y email para enviarte el informe.<br><strong>Lo tenés en menos de 24 horas.</strong></p>

    <form id="contact-form">
      <div>
        <label for="name">Nombre</label>
        <input type="text" id="name" name="name" placeholder="Ej: Valentina Rodríguez" required autocomplete="name">
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email">
      </div>
      <p class="error-msg" id="error-msg"></p>
      <button type="submit" id="submit-btn">Enviar y recibir mi informe</button>
    </form>

    <div class="success-msg" id="success-msg">
      <strong>¡Listo! Te escribimos pronto.</strong>
      Vas a recibir tu informe completo en <strong>menos de 24 horas</strong> en <span id="email-display"></span>. Revisá también tu carpeta de spam.
    </div>
  </div>

  <script>
    const API_URL = 'https://rumbo-six.vercel.app';
    const params  = new URLSearchParams(window.location.search);
    const sessionId = params.get('session');

    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name  = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const btn   = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');

      if (!name || !email) return;

      btn.disabled = true;
      btn.textContent = 'Enviando…';
      errEl.style.display = 'none';

      try {
        const res  = await fetch(`${API_URL}/api/contact`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ sessionId, name, email }),
        });
        const data = await res.json();

        if (data.ok) {
          document.getElementById('contact-form').style.display = 'none';
          document.getElementById('email-display').textContent = email;
          document.getElementById('success-msg').style.display = 'block';
        } else {
          throw new Error(data.error || 'Error al guardar.');
        }
      } catch (err) {
        errEl.textContent = 'Hubo un error. Intentá de nuevo.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Enviar y recibir mi informe';
      }
    });
  </script>
</body>
</html>
